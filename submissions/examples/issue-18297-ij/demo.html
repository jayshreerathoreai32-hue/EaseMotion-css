<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue 18297 - Mouse Trail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="title">Issue 18297 - Mouse Trail</div>
    <p style="color:#94a3b8;">Move your mouse around to see the trail</p>
  </div>
  <script>
    const trailCount = 20;
    const trailElements = [];
    const positions = [];

    for (let i = 0; i < trailCount; i++) {
      const el = document.createElement('div');
      el.className = 'trail';
      el.style.setProperty('--i', i);
      document.body.appendChild(el);
      trailElements.push(el);
      positions.push({ x: 0, y: 0 });
    }

    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animateTrail() {
      positions[0] = { x: mouseX, y: mouseY };
      for (let i = 1; i < trailCount; i++) {
        positions[i].x += (positions[i - 1].x - positions[i].x) * 0.35;
        positions[i].y += (positions[i - 1].y - positions[i].y) * 0.35;
      }
      trailElements.forEach((el, i) => {
        el.style.left = positions[i].x + 'px';
        el.style.top = positions[i].y + 'px';
        el.style.opacity = 1 - (i / trailCount);
        const scale = 1 - (i / trailCount) * 0.7;
        el.style.transform = `translate(-50%,-50%) scale(${scale})`;
      });
      requestAnimationFrame(animateTrail);
    }
    requestAnimationFrame(animateTrail);
  </script>
</body>
</html>
