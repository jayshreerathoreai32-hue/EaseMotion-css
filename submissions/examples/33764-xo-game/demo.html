<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic-Tac-Toe Game</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            body {
                background-color: #121214;
                color: #ffffff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px;
            }

            h1 {
                margin-bottom: 10px;
                font-size: 2.5rem;
                color: #00adb5;
            }

            .status {
                font-size: 1.25rem;
                margin-bottom: 20px;
                height: 30px;
                font-weight: 500;
            }

            .board {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                width: 100%;
                max-width: 360px;
                aspect-ratio: 1 / 1;
                margin-bottom: 25px;
            }

            .cell {
                background-color: #222831;
                border: none;
                border-radius: 8px;
                font-size: 3rem;
                font-weight: bold;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background-color 0.2s, transform 0.1s;
            }

            .cell:hover {
                background-color: #393e46;
            }

            .cell:active {
                transform: scale(0.95);
            }

            .cell.x {
                color: #ff2e63;
            }

            .cell.o {
                color: #00adb5;
            }

            .cell.disabled {
                pointer-events: none;
            }

            .cell.win-highlight {
                background-color: #2b580c;
                color: #a3f7bf;
            }

            .btn {
                background-color: #00adb5;
                color: #eeeeee;
                border: none;
                padding: 12px 28px;
                font-size: 1rem;
                font-weight: bold;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.2s;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            .btn:hover {
                background-color: #007f85;
            }

        </style>
    </head>

    <body>

        <h1>Tic-Tac-Toe</h1>
        <div class="status" id="statusText">Player X's turn</div>

        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <button class="btn" id="resetBtn">New Game</button>

        <script>
            const board = document.getElementById('board');
            const cells = document.querySelectorAll('.cell');
            const statusText = document.getElementById('statusText');
            const resetBtn = document.getElementById('resetBtn');

            let currentPlayer = 'X';
            let gameState = ["", "", "", "", "", "", "", "", ""];
            let isGameActive = true;

            // Corrected win conditions matrix
            const winningConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
                [0, 4, 8], [2, 4, 6]             // Diagonals
            ];

            function handleCellClick(e) {
                const clickedCell = e.target;

                // Ensure we only handle clicks specifically on cell buttons
                if (!clickedCell.classList.contains('cell')) return;

                const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

                if (gameState[clickedCellIndex] !== "" || !isGameActive) {
                    return;
                }

                updateCell(clickedCell, clickedCellIndex);
                checkResult();
            }

            function updateCell(cell, index) {
                gameState[index] = currentPlayer;
                cell.textContent = currentPlayer;
                cell.classList.add(currentPlayer.toLowerCase(), 'disabled');
            }

            function changePlayer() {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                statusText.textContent = `Player ${currentPlayer}'s turn`;
            }

            function checkResult() {
                let roundWon = false;
                let winningCombo = [];

                for (let i = 0; i < winningConditions.length; i++) {
                    const condition = winningConditions[i];
                    let a = gameState[condition[0]];
                    let b = gameState[condition[1]];
                    let c = gameState[condition[2]];

                    if (a === '' || b === '' || c === '') {
                        continue;
                    }
                    if (a === b && b === c) {
                        roundWon = true;
                        winningCombo = condition;
                        break;
                    }
                }

                if (roundWon) {
                    statusText.textContent = `Player ${currentPlayer} Wins!`;
                    highlightWinner(winningCombo);
                    isGameActive = false;
                    return;
                }

                let roundDraw = !gameState.includes("");
                if (roundDraw) {
                    statusText.textContent = "It's a Draw!";
                    isGameActive = false;
                    return;
                }

                changePlayer();
            }

            function highlightWinner(combo) {
                combo.forEach(index => {
                    cells[index].classList.remove('disabled');
                    cells[index].classList.add('win-highlight');
                });
            }

            function resetGame() {
                currentPlayer = 'X';
                gameState = ["", "", "", "", "", "", "", "", ""];
                isGameActive = true;
                statusText.textContent = "Player X's turn";

                cells.forEach(cell => {
                    cell.textContent = "";
                    cell.className = "cell";
                });
            }

            board.addEventListener('click', handleCellClick);
            resetBtn.addEventListener('click', resetGame);
        </script>
    </body>

</html>
